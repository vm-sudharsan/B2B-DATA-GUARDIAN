services:
  - type: web
    name: dataquality-guardian-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python startup.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
